services:
  api:
    image: golang:1.26.3-alpine3.23
    volumes:
      - ./api:/workspace
    command: sh -c "cd /workspace && go run ."
    environment:
      GOFLAGS: -mod=mod
    networks:
      - dev

  nginx:
    image: nginx:1.31.1-alpine3.23
    volumes:
      - ./nginx/html:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    networks:
      - dev

  postgres:
    image: postgres:18.4-alpine3.23
    volumes:
      - ./postgres/scripts/00-init-user-db.sh:/docker-entrypoint-initdb.d/00-init-user-db.sh
      - ./postgres/scripts/01-init-table.sh:/docker-entrypoint-initdb.d/01-init-table.sh
    environment:
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    networks:
      - dev

networks:
  dev:
