services:
  app:
    image: golang:1.26.3-alpine3.23
    volumes:
      - ./app:/workspace
    command: sh -c "go run /workspace/app.go"
    networks:
      - dev

  nginx:
    image: nginx:1.31.1-alpine
    volumes:
      - ./nginx/html:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    networks:
      - dev

networks:
  dev:
