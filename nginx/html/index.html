<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frontend</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 4rem auto; padding: 0 1rem; }
    button { margin: 0.5rem 0; padding: 0.5rem 1rem; cursor: pointer; }
    pre { background: #f4f4f4; padding: 1rem; border-radius: 4px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Go API Frontend</h1>
  <p>API is running on <code>localhost:8090</code></p>

  <button onclick="callHello()">GET /hello</button>
  <button onclick="callHeaders()">GET /headers</button>

  <pre id="output">Response will appear here...</pre>

  <script>
    async function callHello() {
      const res = await fetch('http://localhost:8090/hello');
      document.getElementById('output').textContent = await res.text();
    }
    async function callHeaders() {
      const res = await fetch('http://localhost:8090/headers');
      document.getElementById('output').textContent = await res.text();
    }
  </script>
</body>
</html>
