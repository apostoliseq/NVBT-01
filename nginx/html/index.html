<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frontend</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 4rem auto; padding: 0 1rem; }
    button { margin: 0.5rem 0; padding: 0.5rem 1rem; cursor: pointer; }
    pre { background: #f4f4f4; padding: 1rem; border-radius: 4px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Go API Frontend</h1>

  <div>
    <button onclick="callHello()">GET /hello</button>
    <button onclick="callHeaders()">GET /headers</button>

    <button onclick="saveInput()">POST /save</button>
    <input id="userInput" type="text" maxlength="50" placeholder="Alphanumeric only" />
  </div>

  <pre id="output">Response will appear here...</pre>

  <script>
    async function callHello() {
      const res = await fetch('/hello');
      document.getElementById('output').textContent = await res.text();
    }
    async function callHeaders() {
      const res = await fetch('/headers');
      document.getElementById('output').textContent = await res.text();
    }
    async function saveInput() {
      const value = document.getElementById('userInput').value;
      if (!/^[a-zA-Z0-9]+$/.test(value)) {
        document.getElementById('output').textContent = 'Error: alphanumeric characters only.';
        return;
      }
      const res = await fetch('/save', { method: 'POST', body: value });
      document.getElementById('output').textContent = await res.text();
    }
  </script>
</body>
</html>
